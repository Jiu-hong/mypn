apiVersion: v1
kind: Service
metadata:
  name: casper-node-headless
  namespace: default
  labels:
    app: casper-node
spec:
  ports:
    - port: 35000
      name: p2p
    - port: 8888
      name: rpc
    - port: 7779
      name: binary
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: casper-node
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: casper-node-scripts
  namespace: default
data:
  setup.sh: |
    #!/bin/bash
    set -e

    NETWORK_CONF_URL="http://mynetwork.local:5000/mynetwork/mynetwork.conf"
    NETWORK_CONF_PATH="/etc/casper/network_configs/mynetwork.conf"

    # 1. Download network config
    echo "Downloading network config..."
    mkdir -p /etc/casper/network_configs
    curl -fLo "$NETWORK_CONF_PATH" "$NETWORK_CONF_URL"

    # 2. Check for validator keys (Must be present on host)
    if [ ! -f /etc/casper/validator_keys/secret_key.pem ]; then
        echo "ERROR: Validator key not found at /etc/casper/validator_keys/secret_key.pem"
        exit 1
    else
        echo "Validator key found."
    fi

    # 3. Stage protocols (downloads binaries and configs)
    echo "Staging protocols..."
    # Ensure casper user owns the destination directories first
    chown -R casper:casper /etc/casper /var/lib/casper
    su -s /bin/bash casper -c "casper-node-util stage_protocols mynetwork.conf"

    # 4. Detect latest version
    LATEST_VERSION=$(ls -d /etc/casper/[0-9]*_*/ 2>/dev/null | sort -V | tail -1 | xargs basename)
    if [ -z "$LATEST_VERSION" ]; then
      echo "ERROR: No protocol version dirs found under /etc/casper/"
      exit 1
    fi
    echo "Latest protocol version: $LATEST_VERSION"
    CONFIG_FILE="/etc/casper/${LATEST_VERSION}/config.toml"

    # 5. Set trusted_hash (Skip if INITIAL_VERSION=TRUE)
    if [ "$INITIAL_VERSION" = "TRUE" ] || [ "$INITIAL_VERSION" = "true" ]; then
      echo "INITIAL_VERSION is true. Skipping trusted_hash update."
    else
      echo "INITIAL_VERSION is not true (or unset). Setting trusted_hash..."
      TRUSTED_HASH=$(casper-client get-block --node-address http://192.168.2.101:7777 | jq -r .result.block_with_signatures.block.Version2.hash)
      if [ -z "$TRUSTED_HASH" ] || [ "$TRUSTED_HASH" = "null" ]; then
        echo "ERROR: Failed to get trusted_hash from node"
        exit 1
      fi
      sed -i "s/^#\?trusted_hash = .*/trusted_hash = '${TRUSTED_HASH}'/" "$CONFIG_FILE"
    fi

    # 6. Set public_address to Pod IP
    if [ -z "$LAN_IP" ]; then
      echo "ERROR: LAN_IP environment variable is not set."
      exit 1
    fi
    sed -i "s/^public_address = .*/public_address = '${LAN_IP}:0'/" "$CONFIG_FILE"

    # 7. Peer Discovery (Wait for ALL replicas to have DNS entries)
    REPLICAS=3
    echo "Discovering peers via DNS (headless service)..."

    while true; do
        PEERS=""
        FOUND_COUNT=0
        
        for i in $(seq 0 $((REPLICAS-1))); do
           HOST="casper-node-$i.casper-node-headless"
           # Resolve IP using getent
           IP=$(getent hosts "$HOST" | awk '{ print $1 }')
           
           if [ -n "$IP" ]; then
              echo "  Found $HOST -> $IP"
              PEERS="${PEERS}'${IP}:35000',"
              FOUND_COUNT=$((FOUND_COUNT+1))
           else
              echo "  Waiting for $HOST..."
           fi
        done
        
        if [ "$FOUND_COUNT" -eq "$REPLICAS" ]; then
            echo "✅ Successfully resolved all $REPLICAS/$REPLICAS pods."
            break
        else
            echo "⚠️ Only found $FOUND_COUNT/$REPLICAS pods. Retrying in 5 seconds..."
            sleep 5
        fi
    done

    PEERS=${PEERS%,} # Remove trailing comma

    if [ -n "$PEERS" ]; then
       echo "Setting known_addresses = [$PEERS]"
       sed -i "s/^known_addresses = .*/known_addresses = [$PEERS]/" "$CONFIG_FILE"
    else
       # Should be unreachable due to loop, but good for safety
       echo "Error: Peer list empty after discovery loop."
       exit 1
    fi

  run.sh: |
    #!/bin/bash
    set -e

    # Disable logrotate to reduce noise and potential permission conflicts in K8s
    # while true; do logrotate /etc/logrotate.d/casper; sleep 3600; done &

    # 2. Ensure logs directory exists and is owned by casper
    mkdir -p /var/log/casper
    chown -R casper:casper /var/log/casper
    chmod 755 /var/log/casper

    echo "Initial pod networking delay (10s)..."
    sleep 10

    # Debug: Check known_addresses from config before starting
    echo "--- Debug: known_addresses ---"
    grep "known_addresses" /etc/casper/*/config.toml || echo "Config file not found or known_addresses empty"
    echo "------------------------------"

    echo "Starting casper-node-launcher..."
    export RUST_LOG="${RUST_LOG:-info}"

    # 3. Run launcher as casper user
    # Don't use exec so we can catch exit code and read logs if it fails
    su -s /bin/bash casper -c "export RUST_LOG='${RUST_LOG}'; /usr/bin/casper-node-launcher"

    EXIT_CODE=$?
    echo "Casper node launcher exited with code $EXIT_CODE"

    # If the app wrote to files instead of stdout, let's print them
    if [ -f /var/log/casper/casper-node.log ]; then
       echo "=== /var/log/casper/casper-node.log ==="
       cat /var/log/casper/casper-node.log
    fi
    if [ -f /var/log/casper/casper-node.stderr.log ]; then
        echo "=== /var/log/casper/casper-node.stderr.log ==="
        cat /var/log/casper/casper-node.stderr.log
    fi

    # Keep pod alive for a bit to allow log reading
    sleep 60
    exit $EXIT_CODE
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: casper-node
  namespace: default
spec:
  podManagementPolicy: Parallel
  serviceName: 'casper-node-headless'
  replicas: 3
  selector:
    matchLabels:
      app: casper-node
  template:
    metadata:
      labels:
        app: casper-node
    spec:
      # Spread constraints: Try to keep 1 pod per node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - casper-node
              topologyKey: 'kubernetes.io/hostname'

      hostAliases:
        - ip: '192.168.2.100'
          hostnames:
            - 'mynetwork.local'

      initContainers:
        # First init container: Fix permissions on emptyDirs
        - name: fix-permissions
          image: docker.io/library/casper-run:latest
          imagePullPolicy: Never
          command:
            [
              'sh',
              '-c',
              'mkdir -p /var/lib/casper/bin /etc/casper /var/log/casper && chown -R casper:casper /var/lib/casper /var/log/casper /etc/casper',
            ]
          volumeMounts:
            - name: casper-etc
              mountPath: /etc/casper
            - name: casper-data
              mountPath: /var/lib/casper
            - name: casper-logs
              mountPath: /var/log/casper

        # Second init container: Run our setup script (downloads config, discovers peers)
        - name: setup-config
          image: docker.io/library/casper-run:latest
          imagePullPolicy: Never
          command: ['/bin/bash', '/scripts/setup.sh']
          env:
            - name: LAN_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # For demonstration, only casper-node-0 is INITIAL_VERSION=TRUE?
            # Or pass it via env if needed. For now assuming strictly bootstrapping logic.
            # If you want different behavior for node-0 vs node-1, use checking POD_NAME.
            # Example logic: if name ends in -0, initial=true.
            - name: INITIAL_VERSION
              value: 'TRUE'
          volumeMounts:
            - name: casper-scripts
              mountPath: /scripts
            - name: casper-etc
              mountPath: /etc/casper
            - name: casper-validator-keys
              mountPath: /etc/casper/validator_keys
            - name: casper-data
              mountPath: /var/lib/casper

      containers:
        - name: casper-node
          image: docker.io/library/casper-run:latest
          imagePullPolicy: Never
          command: ['/bin/bash', '/scripts/run.sh']
          env:
            - name: RUST_LOG
              value: 'info'
            - name: LAN_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 7779
            - containerPort: 8888
            - containerPort: 35000
          volumeMounts:
            - name: casper-scripts
              mountPath: /scripts
            - name: casper-validator-keys
              mountPath: /etc/casper/validator_keys
            - name: casper-etc
              mountPath: /etc/casper
            - name: casper-data
              mountPath: /var/lib/casper
            - name: casper-logs
              mountPath: /var/log/casper

      volumes:
        - name: casper-scripts
          configMap:
            name: casper-node-scripts
            defaultMode: 0755
        - name: casper-validator-keys
          hostPath:
            path: /etc/casper/validator_keys
            type: DirectoryOrCreate
        # Shared emptyDirs for config, binaries, logs between init and main containers
        - name: casper-etc
          emptyDir: {}
        - name: casper-data
          emptyDir: {}
        - name: casper-logs
          emptyDir: {}
