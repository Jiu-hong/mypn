apiVersion: v1
kind: Service
metadata:
  name: casper-node-headless
  namespace: default
  labels:
    app: casper-node
spec:
  ports:
    - port: 35000
      name: p2p
    - port: 8888
      name: rpc
    - port: 7779
      name: binary
  clusterIP: None
  selector:
    app: casper-node
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: casper-node
  namespace: default
spec:
  serviceName: 'casper-node-headless'
  replicas: 3
  selector:
    matchLabels:
      app: casper-node
  template:
    metadata:
      labels:
        app: casper-node
    spec:
      # Spread constraints: Try to keep 1 pod per node (like DaemonSet) behavior
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - casper-node
              topologyKey: 'kubernetes.io/hostname'

      hostAliases:
        - ip: '192.168.2.100'
          hostnames:
            - 'mynetwork.local'

      initContainers:
        - name: fix-permissions
          image: docker.io/library/casper-run:latest
          imagePullPolicy: Never
          command:
            [
              'sh',
              '-c',
              'mkdir -p /var/lib/casper/bin /etc/casper /var/log/casper && chown -R casper:casper /var/lib/casper /var/log/casper /etc/casper',
            ]

      containers:
        - name: casper-node
          image: docker.io/library/casper-run:latest
          imagePullPolicy: Never
          env:
            - name: RUST_LOG
              value: 'info'
            - name: INITIAL_VERSION
              value: 'FALSE'
            - name: LAN_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 7779
            - containerPort: 8888
            - containerPort: 35000
          volumeMounts:
            - name: casper-validator-keys
              mountPath: /etc/casper/validator_keys
            # Ephemeral mounts (emptyDir)
            - name: casper-data
              mountPath: /var/lib/casper
            - name: casper-logs
              mountPath: /var/log/casper

      volumes:
        # HostPath for keys (Caution: Requires keys to exist on ALL nodes where pods schedule)
        - name: casper-validator-keys
          hostPath:
            path: /etc/casper/validator_keys
            type: DirectoryOrCreate
        # Ephemeral storage for data/logs
        - name: casper-data
          emptyDir: {}
        - name: casper-logs
          emptyDir: {}
